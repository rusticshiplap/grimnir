name: fetch-feeds

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes
  workflow_dispatch:          # manual run button
  push:
    branches: [ main ]
    paths: [ "feeds.json", "scripts/**", ".github/workflows/**" ]

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci || npm install

      - name: Fetch feeds
        run: npm run fetch

      - name: Commit updated cache
        run: |
          git config user.name  "grimnir-bot"
          git config user.email "grimnir-bot@users.noreply.github.com"
          if [[ -n "$(git status --porcelain cache/feed.json)" ]]; then
            git add cache/feed.json
            git commit -m "chore(cache): refresh feed [skip ci]"
            # Pull any concurrent commits before pushing to avoid hangs
            git fetch origin main
            git rebase origin/main || (git checkout --ours cache/feed.json && git add cache/feed.json && GIT_EDITOR=true git rebase --continue)
            timeout 60 git push || echo "Push skipped (concurrent update)"
          else
            echo "No feed changes."
          fi
