<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 260" role="img" aria-label="Morale patch">
  <defs>
    <linearGradient id="p-n" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <radialGradient id="p-bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
  </defs>
  <rect width="260" height="260" fill="#02040a"/>

  <!-- stitched patch border (zigzag simulation) -->
  <circle cx="130" cy="130" r="110" fill="url(#p-bg)" stroke="url(#p-n)" stroke-width="2"/>
  <circle cx="130" cy="130" r="104" fill="none" stroke="url(#p-n)" stroke-width="0.6" stroke-dasharray="3 2"/>

  <!-- inner shield shape -->
  <path d="M130 50
           L 200 80
           L 200 140
           C 200 180, 170 205, 130 215
           C 90 205, 60 180, 60 140
           L 60 80 Z"
        fill="none" stroke="url(#p-n)" stroke-width="1.5"/>

  <!-- mini hooded figure inside shield -->
  <g transform="translate(90, 80) scale(0.32)">
    <path d="M120 16 C 80 16, 54 46, 50 86 C 46 126, 38 150, 26 176 L 24 230 L 216 230 L 214 176 C 202 150, 194 126, 190 86 C 186 46, 160 16, 120 16 Z"
          fill="#050814" stroke="url(#p-n)" stroke-width="2"/>
    <ellipse cx="120" cy="128" rx="34" ry="52" fill="#000"/>
    <ellipse cx="108" cy="122" rx="6" ry="2.6" fill="#22d3ee"/>
    <ellipse cx="132" cy="122" rx="6" ry="2.6" fill="#22d3ee"/>
  </g>

  <text x="130" y="55" text-anchor="middle" font-family="monospace" font-size="9" fill="#22c55e" letter-spacing="3">OPERATOR // TIER-0</text>
  <text x="130" y="240" text-anchor="middle" font-family="'Orbitron', monospace" font-size="11" fill="url(#p-n)" letter-spacing="4">GRIMNIR OPS</text>
</svg>
