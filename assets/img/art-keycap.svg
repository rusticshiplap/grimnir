<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 260" role="img" aria-label="ESC keycap">
  <defs>
    <linearGradient id="kc-top" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="kc-side" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050814"/>
      <stop offset="100%" stop-color="#000"/>
    </linearGradient>
    <linearGradient id="kc-n" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="kc-g"><feGaussianBlur stdDeviation="0.8"/></filter>
  </defs>
  <rect width="260" height="260" fill="#02040a"/>

  <!-- keycap base (isometric-ish) -->
  <g transform="translate(40,40)">
    <!-- side faces -->
    <polygon points="10,180  10,60  90,10 170,10 170,90 90,140 90,180" fill="url(#kc-side)" stroke="url(#kc-n)" stroke-width="1"/>
    <!-- top face -->
    <polygon points="10,60 90,10 170,10 90,60" fill="url(#kc-top)" stroke="url(#kc-n)" stroke-width="1"/>
    <!-- legend -->
    <text x="55" y="42" font-family="monospace" font-size="14" fill="url(#kc-n)" filter="url(#kc-g)">ESC</text>
    <text x="55" y="42" font-family="monospace" font-size="14" fill="#eafaff">ESC</text>
    <!-- front face engraving -->
    <text x="22" y="115" font-family="monospace" font-size="10" fill="#22c55e">esc the matrix</text>
    <!-- subtle grid on top -->
    <g stroke="rgba(34,211,238,0.12)" stroke-width="0.5">
      <line x1="10" y1="60" x2="90" y2="10"/>
      <line x1="170" y1="10" x2="90" y2="60"/>
    </g>
  </g>

  <text x="130" y="240" text-anchor="middle" font-family="monospace" font-size="11" fill="#22c55e" letter-spacing="2">KEYCAP_01 // ESCAPE_REALITY</text>
</svg>
