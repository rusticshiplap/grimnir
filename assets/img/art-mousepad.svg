<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 200" role="img" aria-label="Desk mat art">
  <defs>
    <linearGradient id="mp-n" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
  </defs>
  <rect width="360" height="200" rx="14" fill="#02040a" stroke="url(#mp-n)" stroke-width="1"/>

  <!-- circuit grid -->
  <g stroke="rgba(34,211,238,0.18)" stroke-width="0.6" fill="none">
    <path d="M20 30 H 90 V 60 H 140"/>
    <path d="M340 40 H 260 V 70 H 200"/>
    <path d="M30 170 H 120 V 140 H 180"/>
    <path d="M340 165 H 260 V 130 H 220"/>
    <circle cx="140" cy="60" r="2.5" fill="#22d3ee" stroke="none"/>
    <circle cx="200" cy="70" r="2.5" fill="#22c55e" stroke="none"/>
    <circle cx="180" cy="140" r="2.5" fill="#22c55e" stroke="none"/>
    <circle cx="220" cy="130" r="2.5" fill="#22d3ee" stroke="none"/>
  </g>

  <!-- wordmark center -->
  <text x="180" y="95" text-anchor="middle" font-family="'Orbitron', monospace" font-size="28" fill="url(#mp-n)" letter-spacing="10">GRIMNIR</text>
  <text x="180" y="120" text-anchor="middle" font-family="monospace" font-size="10" fill="#9ca3af" letter-spacing="6">// THE QUIETER YOU BECOME, THE MORE YOU HEAR</text>
</svg>
