<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="B-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1B1E2C"/>
      <stop offset="1" stop-color="#07080D"/>
    </linearGradient>
    <linearGradient id="B-eye" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00E5FF"/>
      <stop offset="1" stop-color="#00FF9C"/>
    </linearGradient>
    <filter id="B-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Same tactical chevron silhouette -->
  <path d="
    M 14 112
    L 30 78
    L 46 66
    L 46 48
    L 60 8
    L 74 48
    L 74 66
    L 90 78
    L 106 112
    Z
  " fill="url(#B-body)" stroke="#2A2D3A" stroke-width="1.2" stroke-linejoin="miter"/>
  <path d="M 46 48 L 60 14 L 74 48 L 70 56 L 50 56 Z" fill="#05060A"/>
  <path d="M 30 78 L 60 68 L 90 78" fill="none" stroke="#2A2D3A" stroke-width="1"/>
  <line x1="60" y1="68" x2="60" y2="112" stroke="#1F2230" stroke-width="1"/>
  <!-- Two angled eye slits -->
  <g filter="url(#B-glow)">
    <polygon points="50.5,44 58,42 58,46 50.5,48" fill="url(#B-eye)"/>
    <polygon points="62,42 69.5,44 69.5,48 62,46" fill="url(#B-eye)"/>
  </g>
</svg>
