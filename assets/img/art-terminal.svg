<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Terminal art">
  <defs>
    <linearGradient id="t-n" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" rx="10" fill="#02040a" stroke="url(#t-n)" stroke-width="1.2"/>
  <!-- title bar -->
  <rect x="0" y="0" width="320" height="20" rx="10" fill="#0b1220"/>
  <circle cx="14" cy="10" r="3.5" fill="#ef4444"/>
  <circle cx="28" cy="10" r="3.5" fill="#f59e0b"/>
  <circle cx="42" cy="10" r="3.5" fill="#22c55e"/>
  <text x="160" y="13" text-anchor="middle" font-family="monospace" font-size="9" fill="#6b7280">grimnir@shadow: /home/operator</text>

  <!-- lines -->
  <g font-family="monospace" font-size="11">
    <text x="12" y="45" fill="#22c55e">root@grimnir:~#</text>
    <text x="130" y="45" fill="#e5e7eb">whoami</text>
    <text x="12" y="62" fill="#9ca3af">nobody</text>

    <text x="12" y="85" fill="#22c55e">root@grimnir:~#</text>
    <text x="130" y="85" fill="#e5e7eb">trust --all</text>
    <text x="12" y="102" fill="#ef4444">permission denied. verify first.</text>

    <text x="12" y="125" fill="#22c55e">root@grimnir:~#</text>
    <text x="130" y="125" fill="#e5e7eb">sudo make me a sandwich</text>
    <text x="12" y="142" fill="#22d3ee">> creating /tmp/sandwich ...ok</text>

    <text x="12" y="170" fill="#22c55e">root@grimnir:~#</text>
    <text x="130" y="170" fill="#22d3ee">_</text>
  </g>
</svg>
