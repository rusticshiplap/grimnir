<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" role="img" aria-label="Binary heart">
  <defs>
    <radialGradient id="bh-r" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#7f1d1d"/>
    </radialGradient>
    <linearGradient id="bh-n" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <clipPath id="bh-clip">
      <path d="M140 240
               C 60 180, 20 130, 20 90
               C 20 50, 56 30, 80 30
               C 110 30, 130 50, 140 80
               C 150 50, 170 30, 200 30
               C 224 30, 260 50, 260 90
               C 260 130, 220 180, 140 240 Z"/>
    </clipPath>
  </defs>
  <rect width="280" height="280" fill="#02040a"/>

  <!-- heart filled with binary text -->
  <g clip-path="url(#bh-clip)">
    <rect x="0" y="0" width="280" height="280" fill="url(#bh-r)"/>
    <g font-family="monospace" font-size="11" fill="#fee2e2">
      <text x="20" y="40">01101000 01100001 01100011 01101011</text>
      <text x="20" y="55">01110100 01101000 01100101 00100000</text>
      <text x="20" y="70">01110000 01101100 01100001 01101110</text>
      <text x="20" y="85">01100101 01110100 00100000 01101111</text>
      <text x="20" y="100">01110010 00100000 01100100 01101001</text>
      <text x="20" y="115">01100101 00100000 01110100 01110010</text>
      <text x="20" y="130">01111001 01101001 01101110 01100111</text>
      <text x="20" y="145">01110100 01110010 01110101 01110011</text>
      <text x="20" y="160">01110100 00100000 01101110 01101111</text>
      <text x="20" y="175">01110100 01101000 01101001 01101110</text>
      <text x="20" y="190">01100111 00101100 00100000 01110110</text>
      <text x="20" y="205">01100101 01110010 01101001 01100110</text>
      <text x="20" y="220">01111001 00100000 01100101 01110110</text>
      <text x="20" y="235">01100101 01110010 01111001 01110100</text>
    </g>
  </g>

  <!-- outline -->
  <path d="M140 240
           C 60 180, 20 130, 20 90
           C 20 50, 56 30, 80 30
           C 110 30, 130 50, 140 80
           C 150 50, 170 30, 200 30
           C 224 30, 260 50, 260 90
           C 260 130, 220 180, 140 240 Z"
        fill="none" stroke="url(#bh-n)" stroke-width="1.6"/>

  <text x="140" y="270" text-anchor="middle" font-family="monospace" font-size="11" fill="#22c55e" letter-spacing="3">TRUST_NOTHING</text>
</svg>
