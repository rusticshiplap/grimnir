<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" role="img" aria-label="Glitch skull">
  <defs>
    <linearGradient id="gs-n" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="gs-glow"><feGaussianBlur stdDeviation="1.8"/></filter>
  </defs>
  <rect width="300" height="300" fill="#02040a"/>
  <!-- scanlines -->
  <g opacity="0.25">
    <g stroke="#22d3ee" stroke-width="0.4">
      <line x1="0" y1="30" x2="300" y2="30"/>
      <line x1="0" y1="90" x2="300" y2="90"/>
      <line x1="0" y1="150" x2="300" y2="150"/>
      <line x1="0" y1="210" x2="300" y2="210"/>
      <line x1="0" y1="270" x2="300" y2="270"/>
    </g>
  </g>

  <!-- pixel skull, grouped blocks -->
  <g transform="translate(60, 50)" fill="url(#gs-n)" filter="url(#gs-glow)">
    <!-- row helper: 12px blocks -->
    <!-- crown -->
    <rect x="48" y="0"  width="96" height="12"/>
    <rect x="36" y="12" width="120" height="12"/>
    <rect x="24" y="24" width="144" height="12"/>
    <rect x="24" y="36" width="144" height="12"/>
    <rect x="12" y="48" width="168" height="12"/>
    <rect x="12" y="60" width="168" height="12"/>
    <!-- eyes -->
    <rect x="12" y="72"  width="48" height="36" fill="#02040a"/>
    <rect x="132" y="72" width="48" height="36" fill="#02040a"/>
    <rect x="12" y="72"  width="48" height="36" fill="none" stroke="url(#gs-n)" stroke-width="2"/>
    <rect x="132" y="72" width="48" height="36" fill="none" stroke="url(#gs-n)" stroke-width="2"/>
    <rect x="12" y="108" width="168" height="12"/>
    <rect x="12" y="120" width="168" height="12"/>
    <!-- nose -->
    <rect x="84" y="108" width="24" height="24" fill="#02040a"/>
    <!-- teeth -->
    <rect x="24" y="144" width="144" height="24"/>
    <rect x="36" y="144" width="6" height="24" fill="#02040a"/>
    <rect x="60" y="144" width="6" height="24" fill="#02040a"/>
    <rect x="84" y="144" width="6" height="24" fill="#02040a"/>
    <rect x="108" y="144" width="6" height="24" fill="#02040a"/>
    <rect x="132" y="144" width="6" height="24" fill="#02040a"/>
    <rect x="156" y="144" width="6" height="24" fill="#02040a"/>
    <rect x="48" y="168" width="96" height="12"/>
  </g>

  <!-- RGB split artifact -->
  <g opacity="0.55" transform="translate(63, 50)">
    <rect x="12" y="72" width="48" height="36" fill="none" stroke="#ef4444" stroke-width="1"/>
    <rect x="132" y="72" width="48" height="36" fill="none" stroke="#ef4444" stroke-width="1"/>
  </g>

  <!-- glitch bars -->
  <g opacity="0.6">
    <rect x="0" y="118" width="300" height="3" fill="#22d3ee"/>
    <rect x="0" y="176" width="300" height="2" fill="#ef4444"/>
    <rect x="0" y="200" width="300" height="1" fill="#22c55e"/>
  </g>

  <text x="150" y="270" text-anchor="middle" font-family="monospace" font-size="11" fill="#22c55e" letter-spacing="2">SEGFAULT_AT_HEART</text>
</svg>
